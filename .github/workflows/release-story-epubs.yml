name: Release Story EPUBs

on:
  push:
    branches:
      - main
    paths:
      - "books/various-muggles/output/**"
      - "books/various-muggles/config.json"
      - "books/various-muggles/manifest.json"
      - "glossary/**"
      - "cover-hpmor-fanfics-ru.png"
      - "scripts/build_story_release.py"
      - "scripts/detect_story_release_candidates.py"
      - "scripts/sync_manifest.py"
      - "scripts/validate_run.py"
      - "site/scripts/sync-content.ts"
      - "site/src/**"
      - "site/package.json"
      - "package.json"
      - "pyproject.toml"
      - "uv.lock"
      - "site/bun.lock"
      - ".github/workflows/release-story-epubs.yml"
  workflow_dispatch:
    inputs:
      story_id:
        description: "Specific story to build/release, for example story-01"
        required: false
        type: string
      require_reviewed:
        description: "Require the selected story to be fully reviewed"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-story-epubs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-24.04
    outputs:
      story_ids: ${{ steps.stories.outputs.story_ids }}
      story_count: ${{ steps.stories.outputs.story_count }}
      require_reviewed: ${{ steps.settings.outputs.require_reviewed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Restore Bun cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            site/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('site/bun.lock', 'site/package.json', 'package.json') }}

      - name: Install Bun dependencies
        run: bun install --cwd site --frozen-lockfile

      - name: Resolve release settings
        id: settings
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "require_reviewed=${{ inputs.require_reviewed }}" >> "$GITHUB_OUTPUT"
          else
            echo "require_reviewed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync manifest
        run: python3 scripts/sync_manifest.py --book-id various-muggles

      - name: Validate synced workspace state
        run: git diff --exit-code

      - name: Validate translation workspace
        run: python3 scripts/validate_run.py --book-id various-muggles

      - name: Sync reader content
        run: bun run sync-content

      - name: Validate generated reader files
        run: git diff --exit-code

      - name: Detect stories to release
        id: stories
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -z "${{ inputs.story_id }}" ]]; then
              echo "workflow_dispatch requires story_id" >&2
              exit 1
            fi

            python3 scripts/build_story_release.py \
              --book-id various-muggles \
              --list-complete \
              $([[ "${{ steps.settings.outputs.require_reviewed }}" == "true" ]] && echo --require-reviewed) \
              --json > ready.json

            STORY_IDS="$(jq -c --arg requested "$REQUESTED_STORY_ID" '[.[] | select(.story_id == $requested) | .story_id]' ready.json)"
            STORY_COUNT="$(jq -r 'length' <<< "$STORY_IDS")"
            if [[ "$STORY_COUNT" == "0" ]]; then
              echo "Requested story is not release-ready: $REQUESTED_STORY_ID" >&2
              exit 1
            fi
            {
              echo "story_ids=$STORY_IDS"
              echo "story_count=$STORY_COUNT"
            } >> "$GITHUB_OUTPUT"
          else
            BEFORE="${{ github.event.before }}"
            if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              if git rev-parse HEAD^ >/dev/null 2>&1; then
                BEFORE="$(git rev-parse HEAD^)"
              else
                BEFORE="$(git rev-parse HEAD)"
              fi
            fi

            python3 scripts/detect_story_release_candidates.py \
              --book-id various-muggles \
              --base-ref "$BEFORE" \
              --head-ref "${{ github.sha }}" \
              --include-changed-ready \
              $([[ "${{ steps.settings.outputs.require_reviewed }}" == "true" ]] && echo --require-reviewed) \
              --json > release-candidates.json

            STORY_IDS="$(jq -c '[.selected[].story_id]' release-candidates.json)"
            STORY_COUNT="$(jq -r '.selected | length' release-candidates.json)"
            {
              echo "story_ids=$STORY_IDS"
              echo "story_count=$STORY_COUNT"
            } >> "$GITHUB_OUTPUT"
          fi
        env:
          REQUESTED_STORY_ID: ${{ inputs.story_id }}

      - name: Show detected stories
        run: |
          echo "Story count: ${{ steps.stories.outputs.story_count }}"
          echo "Story IDs: ${{ steps.stories.outputs.story_ids }}"

  release:
    needs: detect
    if: needs.detect.outputs.story_count != '0'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        story_id: ${{ fromJson(needs.detect.outputs.story_ids) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pandoc calibre

      - name: Build story EPUB
        run: |
          python3 scripts/build_story_release.py \
            --book-id various-muggles \
            --story-id "${{ matrix.story_id }}" \
            $([[ "${{ needs.detect.outputs.require_reviewed }}" == "true" ]] && echo --require-reviewed) \
            --json > release.json

      - name: Read release metadata
        id: meta
        shell: bash
        run: |
          STORY_TITLE="$(jq -r '.story_title' release.json)"
          OUTPUT_EPUB="$(jq -r '.output_epub' release.json)"
          STORY_ID="$(jq -r '.story_id' release.json)"
          {
            echo "story_title=$STORY_TITLE"
            echo "output_epub=$OUTPUT_EPUB"
            echo "tag_name=various-muggles-$STORY_ID-ru"
            echo "release_name=$STORY_TITLE (RU EPUB)"
          } >> "$GITHUB_OUTPUT"

      - name: Upload EPUB artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.story_id }}-epub
          path: ${{ steps.meta.outputs.output_epub }}
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          files: ${{ steps.meta.outputs.output_epub }}
          overwrite_files: true
          make_latest: false
          body: |
            Автоматически собранный EPUB-релиз для `${{ matrix.story_id }}`.

            История: ${{ steps.meta.outputs.story_title }}
            Коммит: `${{ github.sha }}`
