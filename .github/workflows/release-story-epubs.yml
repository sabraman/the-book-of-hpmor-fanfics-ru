name: Release Story EPUBs

on:
  push:
    branches:
      - main
    paths:
      - "books/various-muggles/output/**"
      - "books/various-muggles/config.json"
      - "books/various-muggles/manifest.json"
      - "glossary/**"
      - "cover-hpmor-fanfics-ru.png"
      - "scripts/build_story_release.py"
      - "scripts/detect_story_release_candidates.py"
      - "scripts/sync_manifest.py"
      - "scripts/validate_run.py"
      - "site/scripts/sync-content.ts"
      - "site/src/**"
      - "site/package.json"
      - "package.json"
      - "pyproject.toml"
      - "uv.lock"
      - "site/bun.lock"
  workflow_dispatch:
    inputs:
      story_id:
        description: "Specific story to build/release, for example story-01"
        required: false
        type: string
      require_reviewed:
        description: "Require the selected story to be fully reviewed"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-story-epubs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      story_ids: ${{ steps.stories.outputs.story_ids }}
      story_count: ${{ steps.stories.outputs.story_count }}
      require_reviewed: ${{ steps.settings.outputs.require_reviewed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install Bun dependencies
        run: bun install --cwd site --frozen-lockfile

      - name: Resolve release settings
        id: settings
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "require_reviewed=${{ inputs.require_reviewed }}" >> "$GITHUB_OUTPUT"
          else
            echo "require_reviewed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync manifest
        run: python3 scripts/sync_manifest.py --book-id various-muggles

      - name: Validate synced workspace state
        run: git diff --exit-code

      - name: Validate translation workspace
        run: python3 scripts/validate_run.py --book-id various-muggles

      - name: Sync reader content
        run: bun run sync-content

      - name: Validate generated reader files
        run: git diff --exit-code

      - name: Detect stories to release
        id: stories
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -z "${{ inputs.story_id }}" ]]; then
              echo "workflow_dispatch requires story_id" >&2
              exit 1
            fi

            python3 scripts/build_story_release.py \
              --book-id various-muggles \
              --list-complete \
              $([[ "${{ steps.settings.outputs.require_reviewed }}" == "true" ]] && echo --require-reviewed) \
              --json > ready.json

            python3 -c '
            import json, os
            requested = os.environ["REQUESTED_STORY_ID"]
            ready = json.load(open("ready.json", encoding="utf-8"))
            selected = [item["story_id"] for item in ready if item["story_id"] == requested]
            if not selected:
                raise SystemExit(f"Requested story is not release-ready: {requested}")
            with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
                handle.write(f"story_ids={json.dumps(selected)}\n")
                handle.write(f"story_count={len(selected)}\n")
            '
          else
            BEFORE="${{ github.event.before }}"
            if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              if git rev-parse HEAD^ >/dev/null 2>&1; then
                BEFORE="$(git rev-parse HEAD^)"
              else
                BEFORE="$(git rev-parse HEAD)"
              fi
            fi

            python3 scripts/detect_story_release_candidates.py \
              --book-id various-muggles \
              --base-ref "$BEFORE" \
              --head-ref "${{ github.sha }}" \
              --include-changed-ready \
              $([[ "${{ steps.settings.outputs.require_reviewed }}" == "true" ]] && echo --require-reviewed) \
              --json > release-candidates.json

            python3 -c '
            import json, os
            payload = json.load(open("release-candidates.json", encoding="utf-8"))
            story_ids = [item["story_id"] for item in payload["selected"]]
            with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
                handle.write(f"story_ids={json.dumps(story_ids)}\n")
                handle.write(f"story_count={len(story_ids)}\n")
            '
          fi
        env:
          REQUESTED_STORY_ID: ${{ inputs.story_id }}

      - name: Show detected stories
        run: |
          echo "Story count: ${{ steps.stories.outputs.story_count }}"
          echo "Story IDs: ${{ steps.stories.outputs.story_ids }}"

  release:
    needs: detect
    if: needs.detect.outputs.story_count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        story_id: ${{ fromJson(needs.detect.outputs.story_ids) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc calibre

      - name: Build story EPUB
        run: |
          python3 scripts/build_story_release.py \
            --book-id various-muggles \
            --story-id "${{ matrix.story_id }}" \
            $([[ "${{ needs.detect.outputs.require_reviewed }}" == "true" ]] && echo --require-reviewed) \
            --json > release.json

      - name: Read release metadata
        id: meta
        shell: bash
        run: |
          python3 -c '
          import json, os
          payload = json.load(open("release.json", encoding="utf-8"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"story_title={payload['story_title']}\n")
              handle.write(f"output_epub={payload['output_epub']}\n")
              handle.write(f"tag_name=various-muggles-{payload['story_id']}-ru\n")
              handle.write(f"release_name={payload['story_title']} (RU EPUB)\n")
          '

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          files: ${{ steps.meta.outputs.output_epub }}
          overwrite_files: true
          make_latest: false
          body: |
            Автоматически собранный EPUB-релиз для `${{ matrix.story_id }}`.

            История: ${{ steps.meta.outputs.story_title }}
            Коммит: `${{ github.sha }}`
